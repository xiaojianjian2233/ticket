# ticket-hub 前端 nginx：入口 :18025（经宿主映射），/fpy 静态 + /api /webhook /minio 反代后端
server {
    listen 80;
    server_name _;
    client_max_body_size 50m;

    # 前端静态（Vite base=/fpy/）
    location /fpy/ {
        alias /usr/share/nginx/html/fpy/;
        try_files $uri $uri/ /fpy/index.html;
    }
    location = / { return 302 /fpy/; }

    # 后端 API / webhook（同 compose 网络内按服务名访问）
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
    location /webhook/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
    # MinIO 对外访问出口（图片 public_url 用 /minio/<bucket>/<key>）
    location /minio/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
    }
}
